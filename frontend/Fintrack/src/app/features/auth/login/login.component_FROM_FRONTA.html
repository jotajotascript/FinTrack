<div class="login-container">

  <div class="login-card">

    <div class="logo-area">
      <div class="logo-content">
        <img src="Logo.png" alt="Logo Fintrack">
        <h1>FinTrack</h1>
      </div>
      <p>Controle financeiro pessoal</p>
    </div>

    <form>

      <div class="input-group">
        <label>E-mail</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-envelope email-icon"></i>
          <input
            type="email"
            placeholder="Digite seu e-mail"
            [(ngModel)]="email"
            name="email"
          >
        </div>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock lock-icon"></i>
          <input
            type="password"
            placeholder="Digite sua senha"
            [(ngModel)]="senha"
            name="senha"
          >
          <i class="fa-regular fa-eye eye-icon"></i>
        </div>
      </div>

      <button type="button" (click)="entrar()" [disabled]="carregando">
        {{ carregando ? 'Entrando...' : 'Entrar' }}
      </button>

      <div class="erro-msg" *ngIf="erro">{{ erro }}</div>

    </form>

    <div class="register-link">
      <span>Não possui conta?</span>
      <a routerLink="/auth/register" class="link-cadastrar">Cadastrar</a>
    </div>

  </div>

</div>
